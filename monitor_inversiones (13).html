<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0b10;--card:#12131a;--card2:#181924;--border:#1e2030;--accent:#6366f1;--accent2:#818cf8;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--text:#e2e8f0;--muted:#64748b;--dim:#334155}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#0f1019,#161830);border-bottom:1px solid var(--border);padding:20px 24px}
.header h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:12px;margin-top:4px}
.tabs{display:flex;gap:4px;padding:12px 24px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:var(--muted);transition:all .2s;white-space:nowrap}
.tab.active{background:rgba(99,102,241,.15);color:var(--accent2)}
.tab:hover:not(.active){background:rgba(255,255,255,.03);color:var(--text)}
.content{padding:20px 24px;max-width:1300px;margin:0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;border-top:3px solid var(--accent)}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:5px}
.kpi-value{font-size:15px;font-weight:800;font-family:'Cascadia Code','Consolas',monospace}
.kpi-sub{font-size:11px;margin-top:3px}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.section-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.section-hdr h3{font-size:15px;font-weight:700}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--card2);padding:9px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);position:sticky;top:0}
.tbl th.r,.tbl td.r{text-align:right}
.tbl td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03)}
.tbl tr:hover{background:rgba(255,255,255,.02)}
.tk{font-family:'Cascadia Code','Consolas',monospace;font-weight:700;font-size:12px}
.mono{font-family:'Cascadia Code','Consolas',monospace;font-size:11px}
.g{color:var(--green)}.rd{color:var(--red)}
.tbl input{min-width:80px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:4px;color:var(--yellow);font-family:'Cascadia Code','Consolas',monospace;font-size:11px;padding:4px 8px;width:95px;text-align:right}
.tbl input:focus{outline:none;border-color:var(--accent)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700}
.badge.auto{background:rgba(74,222,128,.1);color:var(--green)}
.badge.manual{background:rgba(251,191,36,.1);color:var(--yellow)}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:14px;margin-bottom:20px}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px}
.chart-box h4{font-size:14px;font-weight:600;margin-bottom:14px}
.cat-hdr{background:var(--card2);padding:12px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.cat-hdr:hover{background:rgba(255,255,255,.03)}
.cat-hdr h4{font-size:13px;font-weight:600;color:var(--accent2)}
.cat-hdr .total{font-family:'Cascadia Code','Consolas',monospace;font-weight:700;font-size:13px}
.hidden{display:none}
.save-row{margin-bottom:14px;display:flex;gap:12px;align-items:center}
.save-btn{background:var(--accent);color:white;border:none;padding:8px 20px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px}
.status{padding:8px;font-size:12px;color:var(--green);display:none}
.footer{padding:14px 24px;text-align:center;font-size:11px;color:var(--dim);border-top:1px solid var(--border)}
.search{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-size:13px;width:300px;margin-bottom:16px}
.search:focus{outline:none;border-color:var(--accent)}
@media(max-width:768px){.cards{grid-template-columns:1fr 1fr}.chart-grid{grid-template-columns:1fr}.search{width:100%}}
</style>
</head>

h+=`<div class="save-row"><button class="save-btn" onclick="doSave()">Guardar precios</button><span class="status" id="ss">Guardado</span>`;
h+=`<input class="search" placeholder="Buscar ticker..." oninput="SF=this.value;rB('${bk}');" value="${SF}"></div>`;

Object.entries(broker.cats).forEach(([cat,{i:items}])=>{
let filtered=items;
if(SF){const t=SF.toLowerCase();filtered=items.filter(x=>x.tk.toLowerCase().includes(t)||x.d.toLowerCase().includes(t))}
if(filtered.length===0)return;
const catT=filtered.reduce((s,it,idx)=>{const oi=items.indexOf(it);const kc=`${bk}_${cat}_${oi}`;return s+cV(it,gP(bk,cat,oi),SP[kc]!==undefined)},0);
const catUsd=filtered.reduce((s,it)=>s+(it.usd||0),0);
const cid=`c_${bk}_${cat.replace(/\W/g,'')}`;
const isUsdBk2=broker.usdView||false;
const catLabel=isUsdBk2?`USD ${catUsd.toLocaleString('es-AR',{minimumFractionDigits:2})} | ${F(catT)}`:F(catT);
h+=`<div class="section"><div class="cat-hdr" onclick="document.getElementById('${cid}').classList.toggle('hidden')"><h4>${cat} (${filtered.length})</h4><span class="total">${catLabel}</span></div>`;
const isUsdBk=broker.usdView||false;
if(isUsdBk){
h+=`<div id="${cid}"><table class="tbl"><tr><th>Concepto</th><th>Descripción</th><th class="r">USD Nominales</th><th class="r">Valor en Pesos (MEP)</th></tr>`;
}else{
h+=`<div id="${cid}"><table class="tbl"><tr><th>Ticker</th><th>Descripción</th><th class="r">Cantidad</th><th class="r">Costo Compra</th><th class="r">Precio 27/02</th><th class="r">Precio Actual</th><th class="r">Valor Actual</th><th class="r">P&L %</th><th class="r">P&L $</th><th>Desde</th></tr>`;
}

filtered.forEach(it=>{
const oi=items.indexOf(it);
const cp=gP(bk,cat,oi);
if(isUsdBk){
const usdVal=it.usd||0;
h+=`<tr><td class="tk">${it.tk}</td><td style="color:var(--muted)">${it.d}</td>`;
h+=`<td class="r mono" style="font-weight:700;color:var(--green)">USD ${usdVal.toLocaleString('es-AR',{minimumFractionDigits:2})}</td>`;
h+=`<td class="r mono" style="font-weight:700">${F(it.v)}</td></tr>`;
return;
}
const kx=`${bk}_${cat}_${oi}`;const cv=cV(it,cp,SP[kx]!==undefined);
const vp=it.bp&&cp?((cp-it.bp)/it.bp*100):null;
const isA=!!it.gf;
const isF=!!it.fixed;
const iid=`p_${bk}_${cat}_${oi}`;

const cs=COSTS[bk==='provincia'?'P_'+it.tk:it.tk]||COSTS[it.tk];
const costP=cs?cs.c:null;
const pnlPct=costP&&cp?((cp-costP)/costP*100):null;
const pnlVal=costP&&it.q?(it.q*(cp-costP)):null;
const desde=cs?cs.d:'-';
h+=`<tr><td class="tk">${it.tk}</td><td style="color:var(--muted)">${it.d}</td>`;
h+=`<td class="r mono">${it.q!=null?it.q.toLocaleString('es-AR'):'-'}</td>`;
h+=`<td class="r mono" style="color:var(--muted)">${costP!=null?(it.usd?'USD '+costP.toLocaleString('es-AR'):'$ '+costP.toLocaleString('es-AR')):'-'}</td>`;
h+=`<td class="r mono">${it.bp!=null?(it.usd?'USD '+it.bp.toLocaleString('es-AR'):'$ '+it.bp.toLocaleString('es-AR')):'-'}</td>`;
if(it.usd){
const usdV=it.usdVal||0;const arsV=it.arsVal||0;
h+=`<td class="r mono" style="color:var(--green)">USD ${usdV.toLocaleString('es-AR')}</td>`;
h+=`<td class="r mono" style="font-weight:700">${F(arsV)}</td>`;
const uPnl=costP&&it.bp?((it.bp-costP)/costP*100):null;
h+=`<td class="r mono ${uPnl!=null?(uPnl>=0?'g':'rd'):''}" style="font-weight:600">${uPnl!=null?P(uPnl):'-'}</td>`;
h+=`<td class="r">—</td><td style="font-size:10px;color:var(--muted)">${desde}</td>`;
}else if(isF){
h+=`<td class="r mono" style="color:var(--muted)">—</td>`;
h+=`<td class="r mono" style="font-weight:700">${F(cv)}</td>`;
h+=`<td class="r">—</td><td class="r">—</td><td>—</td>`;
}else{
h+=`<td class="r"><input id="${iid}" value="${cp!=null?cp:''}" onchange="oPC('${bk}','${cat}',${oi},this.value)" ${isA?'style="color:var(--green);border-color:rgba(74,222,128,.3)"':''}/></td>`;
h+=`<td class="r mono" style="font-weight:700">${F(cv)}</td>`;
h+=`<td class="r mono ${pnlPct!=null?(pnlPct>=0?'g':'rd'):''}" style="font-weight:600">${pnlPct!=null?P(pnlPct):'-'}</td>`;
h+=`<td class="r mono ${pnlVal!=null?(pnlVal>=0?'g':'rd'):''}" style="font-weight:600;font-size:10px">${pnlVal!=null?F(pnlVal):'-'}</td>`;
h+=`<td style="font-size:10px;color:var(--muted)">${desde}</td>`;
}
h+=`</tr>`;
});
h+=`</table></div></div>`;
});
contentEl.innerHTML=h;
}

function oPC(b,c,i,v){const n=parseFloat(v.replace(/\./g,'').replace(',','.'));if(!isNaN(n)){sP(b,c,i,n);rB(b)}}
function doSave(){localStorage.setItem('mp2',JSON.stringify(SP));const s=document.getElementById('ss');if(s){s.style.display='inline';setTimeout(()=>s.style.display='none',2000)}}

rT();rR();

// ===== LIVE PRICE FETCHING =====
const YAHOO_MAP={};
// Build map from DATA gf fields
Object.entries(DATA).forEach(([bk,{cats}])=>{
Object.entries(cats).forEach(([cat,{i:items}])=>{
items.forEach((it,idx)=>{
if(it.gf){
const tk=it.gf.split(':')[1];
YAHOO_MAP[`${bk}_${cat}_${idx}`]={yf:tk+'.BA',tk:it.tk,bk,cat,idx};
}});});});

let LIVE={};let LIVE_TS=null;

function loadScript(url){
return new Promise(function(resolve){
var cb='_p'+Math.random().toString(36).substr(2,7);
var done=false;
window[cb]=function(data){done=true;resolve(data);delete window[cb]};
var s=document.createElement('script');
s.src=url+'&callback='+cb;
s.onload=function(){setTimeout(function(){if(!done){resolve(null);delete window[cb]}},3000);s.remove()};
s.onerror=function(){resolve(null);delete window[cb];s.remove()};
document.body.appendChild(s);
});
}

async function fetchLive(){
var GAS='https://script.google.com/macros/s/AKfycbzKrPoxCmWkRb4Rwq_o8dAT4FE6L0svk5_dJl6QPMvkFhaQAlzgqfgBHhzzO07egyNNiQ/exec';
var tickers=Object.values(YAHOO_MAP).map(function(m){return m.yf});
var unique=[];
tickers.forEach(function(t){if(unique.indexOf(t)===-1)unique.push(t)});
var statusEl=document.getElementById('liveStatus');
if(statusEl){statusEl.textContent='Buscando '+unique.length+' precios...';statusEl.style.color='var(--yellow)';statusEl.style.display='inline'}
var count=0;

for(var i=0;i<unique.length;i+=8){
var batch=unique.slice(i,i+8);
var url=GAS+'?symbols='+batch.join(',');
var data=await loadScript(url);
if(data){
var keys=Object.keys(data);
for(var k=0;k<keys.length;k++){
if(data[keys[k]]&&data[keys[k]].price){
LIVE[keys[k]]=data[keys[k]].price;
count++;
}
}
}
if(statusEl)statusEl.textContent='Actualizando... '+count+'/'+unique.length;
}

LIVE_TS=new Date();
var mapKeys=Object.keys(YAHOO_MAP);
for(var m=0;m<mapKeys.length;m++){
var key=mapKeys[m];
var info=YAHOO_MAP[key];
var price=LIVE[info.yf];
if(price){SP[info.bk+'_'+info.cat+'_'+info.idx]=price}
}
if(count>0)localStorage.setItem('mp2',JSON.stringify(SP));
if(statusEl){
if(count>0){statusEl.textContent=count+' precios actualizados — '+LIVE_TS.toLocaleTimeString('es-AR');statusEl.style.color='var(--green)'}
else{statusEl.textContent='Error de conexión. Verificá tu internet e intentá de nuevo.';statusEl.style.color='var(--red)'}
statusEl.style.display='inline';
}
if(count>0)rR();
}



// Auto-fetch on load
setTimeout(fetchLive,1000);

</script>
